<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3-6반 축구 허브 | 경기 결과 및 하이라이트</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <header>
    <div class="container">
      <h1>3-6 SOCCER HUB <span style="font-size: 0.8rem; vertical-align: middle; color: var(--text-secondary); letter-spacing: 0; font-family: 'Inter', sans-serif; margin-left: 0.5rem; opacity: 0.8;">by 황용국</span></h1>
      <nav>
        <ul>
          <li><a href="#results">경기 결과</a></li>
          <li><a href="#highlights">하이라이트</a></li>
          <li><a href="#schedule">경기 일정</a></li>
          <li><a href="#team">선수단</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section id="hero">
      <div class="container">
        <h2>하나된 열정, 멈추지 않는 도전</h2>
        <p>우리의 발끝에서 시작되는 3학년 6반의 전설. 우승 그 이상의 감동을 향해 나아갑니다.</p>
      </div>
    </section>

    <section id="results" class="container">
      <h3>최근 경기 결과</h3>
      <div class="grid" id="results-grid">
        <soccer-match-card 
          opponent="3학년 3반" 
          score="3 : 2" 
          date="2026.05.13 1교시" 
          result="win"
          scorers="박준우, 한성종, 이재원"
          link="match-3-3.html">
        </soccer-match-card>
      </div>
    </section>

    <section id="highlights" class="container">
      <h3>경기 하이라이트</h3>
      <div class="grid" id="highlights-grid">
        <soccer-highlight 
          title="3-3반 경기 종료 직전 프리킥 골" 
          thumbnail="assets/images/freekick-thumbnail.jpg"
          src="assets/videos/freekick-goal.mp4"
          link="match-3-3.html">
        </soccer-highlight>
      </div>
    </section>

    <section id="schedule" class="container">
      <h3>향후 경기 일정</h3>
      <div class="grid" id="schedule-grid">
        <soccer-match-card 
          opponent="3학년 1반" 
          score="vs" 
          date="2026.05.18 (교시 미정)" 
          result="upcoming">
        </soccer-match-card>
      </div>
    </section>

    <section id="team" class="container">
      <h3>3-6반 대표 선수단</h3>
      <div class="grid" id="team-grid">
        <soccer-player-card 
          name="황용국" 
          position="FW / 주장" 
          image="assets/images/player-hwang.jpg"
          motto="끝까지 뛰자">
        </soccer-player-card>
        <soccer-player-card 
          name="이재원" 
          position="DF / 에이스" 
          image="assets/images/player-lee.jpg"
          motto="이길게">
        </soccer-player-card>
        <soccer-player-card 
          name="최은율" 
          position="FW / 반장" 
          image="assets/images/player-choi.jpg">
        </soccer-player-card>
        <soccer-player-card 
          name="류영인" 
          position="GK" 
          image="assets/images/player-ryu.jpg"
          motto="막을게">
        </soccer-player-card>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 3-6 Soccer Hub. All rights reserved.</p>
      <p style="margin-top: 0.5rem; color: var(--primary-color); font-weight: bold;">Created by 황용국 (주장)</p>
    </div>
  </footer>

  <script defer type="module" src="/main.js"></script>
</body>
</html>
